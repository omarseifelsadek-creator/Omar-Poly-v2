# ══════════════════════════════════════════════════════════
# OBI STRATEGY CONFIG — Edit while running, auto-reloads
# ══════════════════════════════════════════════════════════
# Changes take effect within ~5 seconds. No restart needed.
# Lines starting with # are comments.

[strategy]
# paper or live (NEVER set live until you've tested thoroughly)
mode = paper

# Which strategies are active (comma-separated)
# Options: sweep_follow, absorption_fade, momentum, imbalance
enabled = sweep_follow, absorption_fade, momentum, imbalance

# Minimum signal confidence to enter (0-100)
min_confidence = 65

# Flow must confirm direction (-1 to 1, higher = stricter)
min_flow_confluence = 0.2

# Seconds between entries (prevents overtrading)
cooldown = 30

[sizing]
# Base position size in USD
base_size = 10

# Maximum single position in USD
max_size = 50

# Scale size with confidence? (true/false)
scale_with_confidence = true

[risk]
# Stop loss as % of entry price
stop_loss_pct = 0.30

# Take profit as % of entry price
take_profit_pct = 0.50

# Force exit after this many seconds
max_hold_seconds = 300

# Max concurrent open positions
max_positions = 3

# Stop all trading if daily loss exceeds this
max_daily_loss = 50

[rotation]
# auto = pick whichever side is closer to 50%
# up = always watch UP token
# down = always watch DOWN token
side = auto

# Seconds before window end to start rotating
rotate_early = 10

[alerts]
# Send telegram alerts? (true/false)
# Requires OBI_TELEGRAM_TOKEN and OBI_TELEGRAM_CHAT_ID env vars
telegram = false

# Minimum confidence to send signal alert
alert_min_confidence = 75
